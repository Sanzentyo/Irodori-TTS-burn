[package]
name = "Irodori-TTS-burn"
version = "0.1.0"
edition = "2024"

[lib]
name = "irodori_tts_burn"

# --------------------------------------------------------------------------
# Feature flags for multi-backend benchmark binaries
#
# These are compile-time-only type-alias selectors.
# All three burn backends are compiled in regardless; these flags only
# control which type alias is active in bench_realmodel.rs.
# Mutually exclusive — select exactly one when building bench_realmodel.
# --------------------------------------------------------------------------
[features]
backend_cpu  = []  # NdArray<f32>  (default fallback)
backend_wgpu = []  # WGPU
backend_cuda = []  # Burn CUDA

[dependencies]
anyhow = "1.0.102"
burn = { version = "0.20.1", features = ["autodiff", "cuda", "ndarray", "wgpu"] }
clap = { version = "4.6.0", features = ["derive"] }
half = "2.7.1"
hf-hub = "0.5.0"
safetensors = "0.7.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
thiserror = "2.0.18"
tokenizers = "0.22.2"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "fmt"] }

[dev-dependencies]
criterion = { version = "0.8.2", features = ["html_reports"] }

[[bench]]
name = "inference"
harness = false
